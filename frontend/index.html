<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/Moodify.svg" />
    <!-- iOS/Safari: PNG only (SVG ignored); path must match public/Moodify.png -->
    <link rel="apple-touch-icon" sizes="180x180" href="/Moodify.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Moodify Music</title>

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Moodify Music" />
    <meta property="og:title" content="Moodify Music" />
    <meta property="og:description" content="Your music — your vibe" />
    <meta property="og:image" content="https://moodify-music.com/Moodify.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <link rel="canonical" href="https://moodify-music.com/" />
    <meta property="og:url" content="https://moodify-music.com/" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Moodify Music" />
    <meta name="twitter:description" content="Your music — your vibe" />
    <meta name="twitter:image" content="https://moodify-music.com/Moodify.png" />

    <meta name="description" content="Your music — your vibe" />
    <meta
      name="keywords"
      content="music, streaming, playlist, mood, artists, albums, songs"
    />

    <!-- Google site name (line by favicon): WebSite JSON-LD on homepage only -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "WebSite",
            "@id": "https://moodify-music.com/#website",
            "url": "https://moodify-music.com/",
            "name": "Moodify Music",
            "alternateName": ["moodify-music.com"],
            "description": "Your music — your vibe",
            "publisher": { "@id": "https://moodify-music.com/#organization" }
          },
          {
            "@type": "Organization",
            "@id": "https://moodify-music.com/#organization",
            "name": "Moodify Music",
            "url": "https://moodify-music.com/",
            "logo": {
              "@type": "ImageObject",
              "url": "https://moodify-music.com/Moodify.png"
            }
          }
        ]
      }
    </script>

    <meta name="theme-color" content="#8b5cf6" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Moodify Music" />
    <meta name="application-name" content="Moodify Music" />
    <meta name="msapplication-TileColor" content="#8b5cf6" />
    <meta name="msapplication-TileImage" content="/Moodify.png" />
  </head>
  <body>
    <h1 class="sr-only">Moodify Music</h1>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
